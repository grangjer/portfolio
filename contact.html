    <div class="contact">

        <div class="text-form">
            <h1>Get in touch.</h1>
        </div>

    <div class="contact-form">
        
<form action="https://formspree.io/f/xqegzpvr" method="POST">
        
    <label for="name">Name:<span class="required">(Required)</span></label>
    <div class="input-group">
        <input type="text" id="name" name="name" placeholder="Name" required>
    </div>

    <label for="email">Email:<span class="required">(Required)</span></label>
    <input type="email" id="email" name="email" placeholder="Email" required>

    <label for="phone">Phone Number:</label>
    <input type="tel" id="phone" name="phone" placeholder="Phone Number">

    <label for="message">Message:<span class="required">(Required)</span></label>
    <textarea id="message" name="message" rows="8" placeholder="Message" required></textarea>

    <button type="submit">Submit</button>

    <input type="hidden" name="_subject" value="New Contact Form Submission">
    <input type="hidden" name="_redirect" value="https://grangjer.github.io/portfolio/thank-you-for-contacting-us.html">
    <input type="text" name="_gotcha" style="display:none">
</form>
